<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="MNPR">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c9a227"/>
      <stop offset="50%" stop-color="#f3d97b"/>
      <stop offset="100%" stop-color="#c9a227"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="#0a1628"/>

  <!-- Bloco MNPR centralizado no ícone -->
  <g transform="translate(32 43)">
    <!-- MN -->
    <g transform="translate(-12.5 0)" text-anchor="middle">
      <text
        y="-1"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="34"
        font-weight="700"
        fill="url(#gold)"
      >M</text>
      <text
        y="-3"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="19"
        font-weight="700"
        fill="#0a1628"
        stroke="#f3d97b"
        stroke-width="1.1"
        paint-order="stroke fill"
      >N</text>
    </g>

    <!-- PR -->
    <g transform="translate(12.5 0)" text-anchor="middle">
      <text
        y="-1"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="34"
        font-weight="700"
        fill="url(#gold)"
      >P</text>
      <text
        y="-3"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="19"
        font-weight="700"
        fill="#0a1628"
        stroke="#f3d97b"
        stroke-width="1.1"
        paint-order="stroke fill"
      >R</text>
    </g>
  </g>
</svg>
